# Badminton Sport Configuration
sport: badminton

# Court dimensions (BWF standard)
court:
  length_m: 13.4
  width_singles_m: 5.18
  width_doubles_m: 6.1
  net_height_center_m: 1.524
  net_height_edges_m: 1.55
  service_line_m: 1.98

# Shuttle properties
shuttle:
  diameter_mm: 62  # Approximate
  max_speed_kmh: 493  # World record (Tan Boon Heong)
  typical_smash_kmh: 250-350

# Tracking configuration
tracking:
  model: yolo  # Options: yolo, tracknetv3, sam2
  yolo:
    model_size: n  # n, s, m, l, x
    confidence_threshold: 0.3
    iou_threshold: 0.5
  tracknetv3:
    checkpoint: null  # Path to weights
    input_frames: 3
  sam2:
    model_size: tiny  # tiny, small, base_plus, large

# Pose estimation
pose:
  model: mediapipe  # Options: mediapipe
  mediapipe:
    model_complexity: 2  # 0, 1, 2 (higher = more accurate)
    min_detection_confidence: 0.5
    min_tracking_confidence: 0.5
    enable_segmentation: false
  output_3d: true

# Court detection
court_detection:
  enabled: true
  method: line_detection  # Options: line_detection, template_matching

# Analytics settings
analytics:
  # Speed detection
  speed:
    enabled: true
    kalman_filter: true
    min_trajectory_frames: 5
    smash_threshold_kmh: 200

  # Heatmaps
  heatmap:
    enabled: true
    resolution: [100, 50]  # Grid resolution
    gaussian_sigma: 2.0

  # Shot classification
  shot_classification:
    enabled: true
    classes:
      - smash
      - clear
      - drop
      - drive
      - net_shot
      - lift
      - push

  # Weakness detection
  weakness:
    enabled: true
    min_samples: 10

# Video processing
video:
  max_fps: 30
  target_resolution: [1280, 720]
  stabilization: false

# Output settings
output:
  annotated_video: true
  analytics_json: true
  heatmap_image: true
  report_pdf: false
